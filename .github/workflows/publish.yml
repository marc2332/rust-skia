name: Cargo Publish

on:
  workflow_dispatch:
  release:
    types: [published]

env:
  CARGO_TERM_COLOR: always

jobs:
  publish:
    name: Publish to crates.io
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          submodules: recursive

      - name: Install Rust toolchain
        uses: dtolnay/rust-toolchain@stable

      - name: Apply freya patches
        run: bash apply-freya-patches.sh

      # Publish in dependency order.
      # --no-verify skips a local build (building skia from source in CI is
      # unnecessary just for publishing the source package to crates.io).
      # Sleeps between steps let the crates.io index catch up so dependents
      # can resolve the newly published versions.

      - name: Publish freya-skia-svg-macros
        run: cargo publish --manifest-path skia-svg-macros/Cargo.toml --no-verify
        env:
          CARGO_REGISTRY_TOKEN: ${{ secrets.CARGO_REGISTRY_TOKEN }}

      - name: Wait for crates.io index
        run: sleep 30

      - name: Publish freya-skia-bindings
        run: cargo publish --manifest-path skia-bindings/Cargo.toml --no-verify
        env:
          CARGO_REGISTRY_TOKEN: ${{ secrets.CARGO_REGISTRY_TOKEN }}

      - name: Wait for crates.io index
        run: sleep 30

      - name: Publish freya-skia-safe
        run: cargo publish --manifest-path skia-safe/Cargo.toml --no-verify
        env:
          CARGO_REGISTRY_TOKEN: ${{ secrets.CARGO_REGISTRY_TOKEN }}
