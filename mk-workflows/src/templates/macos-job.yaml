runs-on: macos-15
env:
  SKIA_DEBUG: $[[skiaDebug]]
  MACOSX_DEPLOYMENT_TARGET: '$[[macosxDeploymentTarget]]'

steps:
- uses: actions/checkout@v3
  with:
    submodules: true

- name: Use Xcode Clang
  run: |
    echo "CC=$(xcrun --find clang)" >> $GITHUB_ENV
    echo "CXX=$(xcrun --find clang++)" >> $GITHUB_ENV

- name: Install Rust
  uses: dtolnay/rust-toolchain@$[[rustToolchain]]

- name: Install Clippy
  run: rustup component add clippy

- name: Install Ninja
  run: brew install ninja

